<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
    <defs>
        <linearGradient id="gGear" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#e7aa2f" stop-opacity="0.28"/>
            <stop offset="1" stop-color="#e7aa2f" stop-opacity="0.06"/>
        </linearGradient>
    </defs>

    <!-- Engranaje grande -->
    <g transform="translate(230,150)" fill="url(#gGear)" stroke="#e7aa2f" stroke-opacity="0.35" stroke-width="2">
        <circle r="95"/>
        <g id="teeth">
            <rect x="-12" y="-118" width="24" height="30" rx="4"/>
            <rect x="-12" y="88" width="24" height="30" rx="4"/>
            <rect x="-118" y="-12" width="30" height="24" rx="4"/>
            <rect x="88" y="-12" width="30" height="24" rx="4"/>
        </g>
        <g transform="rotate(45)">
            <rect x="-12" y="-118" width="24" height="30" rx="4"/>
            <rect x="-12" y="88" width="24" height="30" rx="4"/>
            <rect x="-118" y="-12" width="30" height="24" rx="4"/>
            <rect x="88" y="-12" width="30" height="24" rx="4"/>
        </g>
        <circle r="34" fill="none"/>
    </g>

    <!-- Engranaje pequeño -->
    <g transform="translate(95,235)" fill="none" stroke="#e7aa2f" stroke-opacity="0.28" stroke-width="2">
        <circle r="46"/>
        <g transform="rotate(20)">
            <rect x="-7" y="-58" width="14" height="18" rx="3"/>
            <rect x="-7" y="40" width="14" height="18" rx="3"/>
            <rect x="-58" y="-7" width="18" height="14" rx="3"/>
            <rect x="40" y="-7" width="18" height="14" rx="3"/>
        </g>
        <g transform="rotate(65)">
            <rect x="-7" y="-58" width="14" height="18" rx="3"/>
            <rect x="-7" y="40" width="14" height="18" rx="3"/>
            <rect x="-58" y="-7" width="18" height="14" rx="3"/>
            <rect x="40" y="-7" width="18" height="14" rx="3"/>
        </g>
    </g>

    <!-- Tuerca -->
    <g transform="translate(305,70)" fill="none" stroke="#e7aa2f" stroke-opacity="0.3" stroke-width="2">
        <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14"/>
        <circle r="11"/>
    </g>
</svg>
